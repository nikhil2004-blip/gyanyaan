name: Keep Backend Alive

on:
  schedule:
    # Runs every 14 minutes to prevent Render's 15-minute inactivity sleep
    - cron: '*/14 * * * *'
  # Allows you to trigger the ping manually from the Actions tab
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render Backend
        run: |
          # Ensure you go to GitHub > Settings > Secrets and Variables > Actions
          # and create a new repository secret called BACKEND_URL
          # Example: https://gyanyaan-backend.onrender.com
          URL="${{ secrets.BACKEND_URL }}"
          
          if [ -z "$URL" ]; then
            echo "BACKEND_URL secret is not set! Please add it in GitHub Repository Settings."
            exit 1
          fi
          
          echo "Pinging $URL to keep alive..."
          curl -s -o /dev/null -w "%{http_code}" "$URL"
          echo -e "\nPing successful!"


